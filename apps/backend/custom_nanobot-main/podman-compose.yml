# OptiTrade — Nanobot API server
# Usage:
#   Dev:  podman-compose -f podman-compose.yml up
#   Prod: NANOBOT_ENV=production podman-compose -f podman-compose.yml up -d
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in your API keys
#   2. Create config dir: mkdir -p ~/.nanobot/optitrade-workspace
#   3. Build image:  podman build -t optitrade-nanobot .
#   4. Podman volume permissions: podman run --userns=keep-id (handled below)

x-nanobot-base: &nanobot-base
  image: optitrade-nanobot
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env
  userns_mode: keep-id           # Podman rootless: map host UID into container
  cap_drop:
    - ALL
  cap_add:
    - SYS_ADMIN                  # Required for bubblewrap sandboxing
  security_opt:
    - label=disable              # Podman SELinux label — use instead of apparmor

services:
  nanobot-api:
    container_name: optitrade-nanobot-api
    <<: *nanobot-base
    command:
      - serve
      - --host
      - "0.0.0.0"
      - --port
      - "8900"
      - --workspace
      - /home/nanobot/.nanobot/optitrade-workspace
    restart: unless-stopped
    ports:
      # Dev:  expose only to localhost
      # Prod: change to "0.0.0.0:8900:8900" or put behind a reverse proxy
      - "${NANOBOT_BIND_HOST:-127.0.0.1}:${NANOBOT_API_PORT:-8900}:8900"
    volumes:
      - type: bind
        source: ${NANOBOT_WORKSPACE_DIR:-~/.nanobot/optitrade-workspace}
        target: /home/nanobot/.nanobot/optitrade-workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8900/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
